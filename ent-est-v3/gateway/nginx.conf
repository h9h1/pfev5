events { worker_connections 1024; }
http {
  client_max_body_size 50M;

  upstream users     { server users:8000; }
  upstream courses   { server courses:8001; }
  upstream exams     { server exams:8005; }
  upstream messaging { server messaging:8002; }
  upstream forum     { server forum:8006; }
  upstream calendar  { server calendar:8003; }
  upstream notifications { server notifications:8007; }
  upstream keycloak { server keycloak:8080; }
  upstream minio     { server minio:9000; }

  server {
    listen 80;

    # Proxy MinIO direct — téléchargement rapide sans passer par FastAPI
    location /files/ {
      proxy_pass http://minio/;
      proxy_set_header Host minio:9000;
      proxy_buffering off;
      proxy_read_timeout 300s;
    }

    location /api/users/     { rewrite ^/api/users/(.*)     /$1 break; proxy_pass http://users;     proxy_set_header Host $host; proxy_read_timeout 120s; }
    location /api/courses/   { rewrite ^/api/courses/(.*)   /$1 break; proxy_pass http://courses;   proxy_set_header Host $host; proxy_read_timeout 300s; proxy_buffering off; }
    location /api/exams/     { rewrite ^/api/exams/(.*)     /$1 break; proxy_pass http://exams;     proxy_set_header Host $host; proxy_read_timeout 300s; proxy_buffering off; }
    location /api/messaging/ { rewrite ^/api/messaging/(.*) /$1 break; proxy_pass http://messaging; proxy_set_header Host $host; proxy_read_timeout 120s; }
    location /api/forum/     { rewrite ^/api/forum/(.*)     /$1 break; proxy_pass http://forum;     proxy_set_header Host $host; proxy_read_timeout 120s; }
    location /auth/ { proxy_pass http://keycloak/auth/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /realms/ { proxy_pass http://keycloak/realms/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/calendar/  { rewrite ^/api/calendar/(.*)  /$1 break; proxy_pass http://calendar;  proxy_set_header Host $host; proxy_read_timeout 120s; }
    location /api/notifications/ { rewrite ^/api/notifications/(.*) /$1 break; proxy_pass http://notifications; proxy_set_header Host $host; }
    location /api/ollama/    { rewrite ^/api/ollama/(.*)    /$1 break; proxy_pass http://172.20.0.1:11434; proxy_set_header Host $host; proxy_read_timeout 300s; }
  }
}
